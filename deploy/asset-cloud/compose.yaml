services:
  qingshe-assets:
    image: ${QINGSHE_APP_IMAGE:-qingshe-assets:latest}
    build:
      context: ../..
      dockerfile: deploy/asset-cloud/Dockerfile
    environment:
      QINGSHE_ADMIN_TOKEN: ${QINGSHE_ADMIN_TOKEN}
      QINGSHE_ADMIN_PASSWORD_HASH: ${QINGSHE_ADMIN_PASSWORD_HASH}
      QINGSHE_ADMIN_PASSWORD_SALT: ${QINGSHE_ADMIN_PASSWORD_SALT}
      QINGSHE_ADMIN_SESSION_SECRET: ${QINGSHE_ADMIN_SESSION_SECRET}
      QINGSHE_ADMIN_USERNAME: ${QINGSHE_ADMIN_USERNAME}
      QINGSHE_ALLOWED_ORIGINS: ${QINGSHE_ALLOWED_ORIGINS}
      QINGSHE_ASSET_LIBRARY: /data
      QINGSHE_EDITOR_TOKEN: ${QINGSHE_EDITOR_TOKEN}
      QINGSHE_SUBMISSION_TOKEN: ${QINGSHE_SUBMISSION_TOKEN}
      QINGSHE_TRUSTED_PROXY_IPS: ${QINGSHE_TRUSTED_PROXY_IPS:-}
      QINGSHE_PROCESSING_REGISTRATION_TOKEN: ${QINGSHE_PROCESSING_REGISTRATION_TOKEN}
    restart: unless-stopped
    cpus: "0.75"
    mem_limit: 512m
    stop_grace_period: 30s
    expose:
      - "7000"
    healthcheck:
      test:
        - CMD
        - .venv/bin/python
        - -c
        - "import json, urllib.request; response = urllib.request.urlopen('http://127.0.0.1:7000/api/v1/health', timeout=3); assert response.status == 200 and json.load(response).get('status') in {'ready', 'maintenance', 'degraded'}"
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m
    volumes:
      - ./data:/data
    networks:
      qingshe_internal:
        ipv4_address: 172.30.232.2

  qingshe-assets-canary:
    image: ${QINGSHE_APP_IMAGE:-qingshe-assets:latest}
    environment:
      QINGSHE_ADMIN_TOKEN: ${QINGSHE_ADMIN_TOKEN}
      QINGSHE_ADMIN_PASSWORD_HASH: ${QINGSHE_ADMIN_PASSWORD_HASH}
      QINGSHE_ADMIN_PASSWORD_SALT: ${QINGSHE_ADMIN_PASSWORD_SALT}
      QINGSHE_ADMIN_SESSION_SECRET: ${QINGSHE_ADMIN_SESSION_SECRET}
      QINGSHE_ADMIN_USERNAME: ${QINGSHE_ADMIN_USERNAME}
      QINGSHE_ALLOWED_ORIGINS: ${QINGSHE_ALLOWED_ORIGINS}
      QINGSHE_ASSET_LIBRARY: /data
      QINGSHE_EDITOR_TOKEN: ${QINGSHE_EDITOR_TOKEN}
      QINGSHE_SUBMISSION_TOKEN: ${QINGSHE_SUBMISSION_TOKEN}
      QINGSHE_TRUSTED_PROXY_IPS: ${QINGSHE_TRUSTED_PROXY_IPS:-}
      QINGSHE_PROCESSING_REGISTRATION_TOKEN: ${QINGSHE_PROCESSING_REGISTRATION_TOKEN}
    restart: unless-stopped
    cpus: "0.75"
    mem_limit: 512m
    stop_grace_period: 30s
    expose:
      - "7000"
    healthcheck:
      test:
        - CMD
        - .venv/bin/python
        - -c
        - "import json, urllib.request; response = urllib.request.urlopen('http://127.0.0.1:7000/api/v1/health', timeout=3); assert response.status == 200 and json.load(response).get('status') in {'ready', 'maintenance', 'degraded'}"
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m
    volumes:
      - ./data:/data
    networks:
      qingshe_internal:
        ipv4_address: 172.30.232.4

  caddy:
    image: caddy:2.10.2-alpine
    depends_on:
      qingshe-assets:
        condition: service_healthy
    restart: unless-stopped
    cpus: "0.20"
    mem_limit: 128m
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    logging:
      driver: json-file
      options:
        max-file: "3"
        max-size: 10m
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/xiduoduo-site:/srv/xiduoduo-site:ro
      - caddy_config:/config
      - caddy_data:/data
    networks:
      qingshe_internal:
        ipv4_address: 172.30.232.3

volumes:
  caddy_config:
  caddy_data:

networks:
  qingshe_internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.232.0/28
